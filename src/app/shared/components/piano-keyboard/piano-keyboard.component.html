<div class="piano" role="group" aria-label="Teclado de piano">
  @for (key of keys; track key.note) {
    <div
      class="piano__white-wrap"
      [class.piano__white-wrap--has-black]="key.blackAfter"
    >
      <button
        class="piano__key"
        [class.piano__key--highlighted]="highlightedNote() === key.note"
        [class.piano__key--selected]="selectedNote() === key.note"
        [class.piano__key--wrong]="wrongNote() === key.note"
        [class.piano__key--pressed]="pressedNote() === key.note"
        [disabled]="disabled()"
        [attr.aria-label]="'Nota ' + key.note"
        [attr.aria-pressed]="selectedNote() === key.note"
        (click)="tapKey(key)"
        (keydown.enter)="tapKey(key)"
        (keydown.space)="tapKey(key)"
      >
        <span class="piano__key-label">{{ key.label }}</span>
        @if (showKeyboardHints()) {
          <span class="piano__key-hint">{{ key.keyboardKey.toUpperCase() }}</span>
        }
      </button>
      @if (key.blackAfter) {
        @let bk = getBlackKey(key);
        @if (bk) {
          <button
            class="piano__black-key piano__black-key--interactive"
            [class.piano__black-key--highlighted]="highlightedNote() === bk.note"
            [class.piano__black-key--selected]="selectedNote() === bk.note"
            [class.piano__black-key--wrong]="wrongNote() === bk.note"
            [class.piano__black-key--pressed]="pressedNote() === bk.note"
            [disabled]="disabled()"
            [attr.aria-label]="'Nota ' + bk.note"
            (click)="tapKey(bk)"
          >
            @if (showKeyboardHints()) {
              <span class="piano__black-key-hint">{{ bk.keyboardKey.toUpperCase() }}</span>
            }
          </button>
        }
      }
    </div>
  }
</div>
